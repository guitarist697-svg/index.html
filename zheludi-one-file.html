<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Жёлуди</title>
  <style>
    :root {
      --bg:#fffaf1; --card:#fff; --text:#332316; --muted:#7a6a5b;
      --line:#eadfce; --brown:#8b5e34; --dark:#4b3524; --green:#708b4f;
      --cream:#fff8ed; --shadow:0 18px 45px rgba(75,53,36,.12);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(112,139,79,.16),transparent 34%),radial-gradient(circle at top right,rgba(139,94,52,.13),transparent 32%),var(--bg)}
    .app{max-width:1120px;margin:auto;padding:18px 14px 48px}
    .hero{display:flex;justify-content:space-between;gap:18px;padding:26px;margin-bottom:16px;border-radius:32px;color:#fff8ed;background:linear-gradient(135deg,var(--dark),var(--brown) 58%,var(--green));box-shadow:var(--shadow)}
    .logo{width:58px;height:58px;display:grid;place-items:center;margin-bottom:12px;border-radius:20px;background:rgba(255,248,237,.16);font-size:34px}
    h1{margin:0 0 6px;font-size:clamp(38px,7vw,68px);line-height:.95;letter-spacing:-.06em}
    h2{margin:0 0 12px;font-size:22px;letter-spacing:-.03em}
    p{margin-top:0}.muted{color:var(--muted);line-height:1.5}
    .hero p{margin:0;color:rgba(255,248,237,.82);font-weight:650}
    .heroCard{min-width:190px;display:grid;align-content:center;padding:18px;border:1px solid rgba(255,248,237,.22);border-radius:24px;background:rgba(255,248,237,.12)}
    .heroCard span{color:rgba(255,248,237,.78);font-weight:800}.heroCard strong{font-size:28px}
    .layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}.stack{display:grid;gap:16px}
    .card{background:rgba(255,255,255,.9);border:1px solid rgba(234,223,206,.95);border-radius:26px;padding:18px;box-shadow:var(--shadow)}
    label{display:block;margin:12px 0 6px;color:var(--muted);font-size:13px;font-weight:800}
    input,select,button{font:inherit}
    input,select{width:100%;border:1px solid var(--line);background:white;color:var(--text);border-radius:16px;padding:13px 14px;outline:none}
    button{border:0;border-radius:16px;padding:13px 16px;background:var(--brown);color:white;font-weight:850;cursor:pointer}
    .secondary{background:#f3e5d2;color:var(--dark)}.danger{background:#fee2d6;color:#8a2f18}
    .inline{display:grid;grid-template-columns:1fr auto;gap:8px}.grid2{display:grid;grid-template-columns:1fr 180px;gap:12px}
    .people{display:grid;gap:8px;margin-top:12px}.person{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:18px;background:var(--cream);border:1px solid var(--line)}
    .ghost{width:36px;height:36px;padding:0;display:grid;place-items:center}
    .chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:#f3e5d2;color:var(--dark)}.chip.active{background:var(--green);color:white}
    .exact{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .empty{padding:18px;border:1px dashed #d8c7af;border-radius:20px;color:var(--muted);text-align:center;background:var(--cream)}
    .expense{padding:0;margin-top:10px;border:1px solid var(--line);border-radius:20px;background:white;overflow:hidden}
    .expense summary{display:flex;justify-content:space-between;gap:12px;align-items:center;cursor:pointer;padding:14px;list-style:none}
    .expense summary::-webkit-details-marker{display:none}.expense small{display:block;margin-top:4px;color:var(--muted)}
    .shares{display:flex;flex-wrap:wrap;gap:8px;padding:0 14px 14px}.shares span{padding:8px 10px;border-radius:999px;background:var(--cream);font-weight:750;font-size:13px}
    .remove{margin:0 14px 14px}
    .resultHead{display:flex;justify-content:space-between;gap:12px;align-items:start}
    .transfer{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px;margin-top:10px;border-radius:22px;background:linear-gradient(135deg,#fff8ed,#eef5df);border:1px solid #d9e6c2;font-size:19px;font-weight:900}
    .transfer strong{color:#3f5d2b;white-space:nowrap}.details{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
    .balance{display:grid;grid-template-columns:80px repeat(3,1fr);gap:8px;padding:10px 0;border-bottom:1px solid var(--line);color:var(--muted);font-size:14px}.balance strong{color:var(--text)}
    @media(max-width:860px){.hero{display:grid}.heroCard{min-width:0}.layout{grid-template-columns:1fr}.grid2,.exact,.balance{grid-template-columns:1fr}.transfer{align-items:flex-start;flex-direction:column}.resultHead{display:grid}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div><div class="logo">🌰</div><h1>Жёлуди</h1><p>Разделить счёт без споров.</p></div>
      <div class="heroCard"><span>Всего</span><strong id="total">0 ₽</strong></div>
    </section>

    <section class="layout">
      <aside class="stack">
        <div class="card">
          <label>Название встречи</label>
          <input id="meetingTitle" value="Бар Custom">
        </div>

        <div class="card">
          <h2>Кабаны</h2>
          <div class="inline">
            <input id="personName" placeholder="Имя">
            <button onclick="addPerson()">+</button>
          </div>
          <div id="people" class="people"></div>
        </div>

        <div class="card">
          <h2>Режим</h2>
          <select id="resultMode" onchange="render()">
            <option value="direct">Прямые долги</option>
            <option value="minimal" selected>Минимум переводов</option>
          </select>
        </div>
      </aside>

      <section class="stack">
        <div class="card">
          <h2 id="meetingTitleView">Бар Custom</h2>
          <p class="muted">Добавь общий чек или отдельные расходы. Для чека с блюдами удобно выбрать “Точные суммы”.</p>

          <div class="grid2">
            <div><label>Название</label><input id="expenseTitle" placeholder="чек / такси / чаевые"></div>
            <div><label>Сумма</label><input id="amount" type="number" placeholder="9460"></div>
          </div>

          <div class="grid2">
            <div><label>Кто оплатил</label><select id="payer"></select></div>
            <div>
              <label>Как делим</label>
              <select id="mode" onchange="renderSelected()">
                <option value="equal">Поровну</option>
                <option value="exact">Точные суммы</option>
              </select>
            </div>
          </div>

          <label>Участники расхода</label>
          <div id="selectedPeople" class="chips"></div>
          <div id="exactAmounts" class="exact"></div>

          <div class="actions">
            <button onclick="addExpense()">Добавить желудь</button>
            <button class="secondary" onclick="loadExample()">Пример последнего чека</button>
            <button class="secondary" onclick="clearExpenses()">Очистить</button>
          </div>
        </div>

        <div class="card">
          <h2>Расходы</h2>
          <div id="expenses"></div>
        </div>

        <div class="card">
          <div class="resultHead">
            <div><h2>Кто кому</h2><p id="modeText" class="muted"></p></div>
            <button class="secondary" onclick="toggleDetails()">Расчет</button>
          </div>
          <div id="result"></div>
          <div id="details" class="details" style="display:none"></div>
        </div>
      </section>
    </section>
  </main>

<script>
let people = ["В", "М", "А"];
let selected = ["В", "М", "А"];
let showDetails = false;
let expenses = [];
loadExample(false);

const $ = id => document.getElementById(id);

function roundMoney(value){ return Math.round((Number(value)+Number.EPSILON)*100)/100; }
function money(value){ return roundMoney(value).toLocaleString("ru-RU",{minimumFractionDigits:2,maximumFractionDigits:2})+" ₽"; }
function getShares(expense){
  if(!expense.participants.length) return [];
  if(expense.mode==="exact") return expense.participants.map(p=>({name:p.name,amount:Number(p.amount)||0}));
  const part = expense.amount / expense.participants.length;
  return expense.participants.map(p=>({name:p.name,amount:part}));
}
function calculate(){
  const resultMode = $("resultMode").value;
  const balance={}, paid={}, consumed={}, direct={};
  people.forEach(p=>{balance[p]=0;paid[p]=0;consumed[p]=0;});
  expenses.forEach(e=>{
    paid[e.payer]=(paid[e.payer]||0)+e.amount;
    balance[e.payer]=(balance[e.payer]||0)+e.amount;
    getShares(e).forEach(s=>{
      consumed[s.name]=(consumed[s.name]||0)+s.amount;
      balance[s.name]=(balance[s.name]||0)-s.amount;
      if(s.name!==e.payer){
        const key=s.name+"|||"+e.payer;
        direct[key]=(direct[key]||0)+s.amount;
      }
    });
  });
  return {balance,paid,consumed,transfers: resultMode==="minimal" ? minimize(balance) : simplifyDirect(direct)};
}
function simplifyDirect(direct){
  const pairs={};
  Object.entries(direct).forEach(([key,amount])=>{
    const [from,to]=key.split("|||");
    const sorted=[from,to].sort();
    const pairKey=sorted[0]+"|||"+sorted[1];
    const sign=from===sorted[0]?1:-1;
    pairs[pairKey]=(pairs[pairKey]||0)+sign*amount;
  });
  return Object.entries(pairs).map(([key,net])=>{
    const [a,b]=key.split("|||");
    const amount=roundMoney(Math.abs(net));
    if(amount<0.01) return null;
    return net>0?{from:a,to:b,amount}:{from:b,to:a,amount};
  }).filter(Boolean).sort((a,b)=>b.amount-a.amount);
}
function minimize(balance){
  const debtors=[],creditors=[];
  Object.entries(balance).forEach(([name,value])=>{
    const amount=roundMoney(value);
    if(amount<-0.01) debtors.push({name,amount:-amount});
    if(amount>0.01) creditors.push({name,amount});
  });
  debtors.sort((a,b)=>b.amount-a.amount); creditors.sort((a,b)=>b.amount-a.amount);
  const transfers=[]; let i=0,j=0;
  while(i<debtors.length && j<creditors.length){
    const amount=roundMoney(Math.min(debtors[i].amount,creditors[j].amount));
    transfers.push({from:debtors[i].name,to:creditors[j].name,amount});
    debtors[i].amount=roundMoney(debtors[i].amount-amount);
    creditors[j].amount=roundMoney(creditors[j].amount-amount);
    if(debtors[i].amount<0.01) i++;
    if(creditors[j].amount<0.01) j++;
  }
  return transfers;
}
function addPerson(){
  const name=$("personName").value.trim();
  if(!name || people.includes(name)) return;
  people.push(name); selected.push(name); $("personName").value="";
  render();
}
function removePerson(name){
  people=people.filter(p=>p!==name);
  selected=selected.filter(p=>p!==name);
  expenses=expenses.filter(e=>e.payer!==name).map(e=>({...e,participants:e.participants.filter(p=>p.name!==name)})).filter(e=>e.participants.length);
  render();
}
function toggleSelected(name){
  selected = selected.includes(name) ? selected.filter(p=>p!==name) : [...selected,name];
  renderSelected();
}
function addExpense(){
  const title=$("expenseTitle").value.trim();
  const amount=Number($("amount").value);
  const payer=$("payer").value;
  const mode=$("mode").value;
  if(!title) return alert("Введите название расхода");
  if(!amount || amount<=0) return alert("Введите сумму");
  if(!payer) return alert("Выберите, кто оплатил");
  if(!selected.length) return alert("Выберите участников");
  let participants = selected.map(name=>({name}));
  if(mode==="exact"){
    participants = selected.map(name=>({name,amount:Number($("exact_"+name).value)||0}));
    const exactTotal=roundMoney(participants.reduce((s,p)=>s+p.amount,0));
    if(Math.abs(exactTotal-amount)>0.01) return alert("Точные суммы должны давать "+money(amount)+". Сейчас: "+money(exactTotal));
  }
  expenses.push({id:crypto.randomUUID(),title,amount,payer,mode,participants});
  $("expenseTitle").value=""; $("amount").value="";
  render();
}
function loadExample(shouldRender=true){
  expenses=[
    {id:crypto.randomUUID(),title:"Чек Custom",amount:9460,payer:"В",mode:"exact",participants:[{name:"В",amount:3336.67},{name:"М",amount:3512.67},{name:"А",amount:2610.66}]},
    {id:crypto.randomUUID(),title:"Чаевые",amount:200,payer:"М",mode:"equal",participants:[{name:"В"},{name:"М"},{name:"А"}]}
  ];
  if(shouldRender) render();
}
function clearExpenses(){ expenses=[]; render(); }
function toggleDetails(){ showDetails=!showDetails; render(); }
function renderSelected(){
  $("selectedPeople").innerHTML = people.map(p=>`<button class="chip ${selected.includes(p)?"active":""}" onclick="toggleSelected('${p}')">${p}</button>`).join("");
  $("exactAmounts").innerHTML = $("mode").value==="exact" ? selected.map(p=>`<div><label>${p}</label><input id="exact_${p}" type="number" placeholder="0"></div>`).join("") : "";
}
function render(){
  $("meetingTitleView").textContent=$("meetingTitle").value || "Встреча";
  $("people").innerHTML = people.map(p=>`<div class="person"><strong>${p}</strong><button class="ghost danger" onclick="removePerson('${p}')">×</button></div>`).join("");
  $("payer").innerHTML = people.map(p=>`<option>${p}</option>`).join("");
  renderSelected();

  const total = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  $("total").textContent=money(total);

  $("expenses").innerHTML = expenses.length ? expenses.map(e=>`
    <details class="expense">
      <summary><span><strong>${e.title}</strong><small>Оплатил ${e.payer}</small></span><b>${money(e.amount)}</b></summary>
      <div class="shares">${getShares(e).map(s=>`<span>${s.name}: ${money(s.amount)}</span>`).join("")}</div>
      <button class="remove danger" onclick="expenses=expenses.filter(x=>x.id!=='${e.id}');render()">Удалить</button>
    </details>`).join("") : `<div class="empty">Пока нет расходов.</div>`;

  const calc = calculate();
  $("modeText").textContent = $("resultMode").value==="direct" ? "Прямые долги показывают происхождение долга." : "Минимум переводов сокращает количество переводов.";
  $("result").innerHTML = calc.transfers.length ? calc.transfers.map(t=>`<div class="transfer"><span>${t.from} → ${t.to}</span><strong>${money(t.amount)}</strong></div>`).join("") : `<div class="empty">Все в расчете.</div>`;
  $("details").style.display = showDetails ? "block" : "none";
  $("details").innerHTML = `<h3>Балансы</h3>` + people.map(p=>`<div class="balance"><strong>${p}</strong><span>оплатил ${money(calc.paid[p]||0)}</span><span>доля ${money(calc.consumed[p]||0)}</span><span>баланс ${money(calc.balance[p]||0)}</span></div>`).join("");
}
$("meetingTitle").addEventListener("input", render);
$("personName").addEventListener("keydown", e=>{ if(e.key==="Enter") addPerson(); });
render();
</script>
</body>
</html>
